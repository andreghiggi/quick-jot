name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy to Comanda Tech VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist to VPS
        run: |
          tar -C dist -czf - . | ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            echo "==> Preparing static deploy"
            rm -rf /tmp/comandatech-dist
            mkdir -p /tmp/comandatech-dist /var/www/comandatech/dist
            tar -xzf - -C /tmp/comandatech-dist
            echo "==> Publishing dist"
            rm -rf /var/www/comandatech/dist/*
            cp -a /tmp/comandatech-dist/. /var/www/comandatech/dist/
            echo "==> Reloading Nginx"
            systemctl reload nginx
            echo "==> Deploy complete!"
          ENDSSH