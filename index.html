    <script>
      // Redireciona automaticamente o domínio antigo para o novo,
      // preservando rota completa (ex: /cardapio/lancheria-da-i9-263ee29a)
      (function () {
        try {
          var h = window.location.hostname;
          if (h === 'appcomandatech.agilizeerp.com.br' || h.endsWith('.agilizeerp.com.br')) {
            var newHost = (h === 'appcomandatech.agilizeerp.com.br')
              ? 'app.comandatech.com.br'
              : h.replace('.agilizeerp.com.br', '.comandatech.com.br');
            window.location.replace(
              'https://' + newHost + window.location.pathname + window.location.search + window.location.hash
            );
          }
        } catch (e) {}
      })();
    </script>
